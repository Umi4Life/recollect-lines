# Example provider configuration for recollect-lines' openai_compatible runtime.
#
# This file is illustrative only: base URLs, model names, and api_key_env
# names are placeholders. It contains no real API keys, tokens, or auth
# headers -- api_key_env names an *environment variable* that must hold the
# real credential; the credential value itself is never written to a config
# file.
#
# Copy this file to one of the resolved config locations (highest precedence
# first) and edit it:
#   --providers-config /path/to/your.yaml   (explicit flag)
#   $RECOLLECT_CONFIG                       (env var pointing at a file)
#   ./.recollect/config.yaml                (repo-local; gitignored)
#   ~/.recollect/config.yaml                (user-level; gitignored)
# See docs/cli.md for the full resolution order, and
# config/providers.schema.json for the machine-readable contract.
#
# `recollect-lines config validate` reports the resolved source and
# validation result without ever printing a credential value.
# `recollect-lines config init` writes a minimal starter file like this one.

providers:
  # A loopback gateway (e.g. a local LiteLLM proxy). http:// is only ever
  # permitted for loopback hosts (127.0.0.1/localhost/::1), and only with
  # allow_insecure_http explicitly set to true.
  local_gateway:
    kind: openai-compatible
    base_url: http://127.0.0.1:4000/v1
    api_key_env: LOCAL_GATEWAY_API_KEY
    default_model: local-coder
    allow_insecure_http: true
    request_timeout_seconds: 120
    capabilities:
      chat_completions: true
      structured_output: false
      streaming: false
      tool_calls: false

  # A remote HTTPS endpoint. tls_verify defaults to true; ca_bundle is an
  # optional filesystem path to a custom CA bundle file (never inline
  # certificate/key content). See docs/getting-started.md for portable CA
  # guidance across Linux/macOS.
  remote_gateway:
    kind: openai-compatible
    base_url: https://gateway.example.invalid/v1
    api_key_env: REMOTE_GATEWAY_API_KEY
    default_model: remote-coder
    tls_verify: true
    # ca_bundle: /etc/ssl/certs/ca-certificates.crt
    request_timeout_seconds: 90
    estimated_cost_usd_upper_bound: 0.05
    capabilities:
      chat_completions: true
      structured_output: true
      streaming: false
      tool_calls: false

# Optional: operator-approved repository-read tool-access profile (RFC-002).
# Each entry is a finite exact allowlist of external MCP tool identifiers.
# Wildcards/prefixes are rejected. MCP credentials stay in the runtime's own
# configuration — never in this file.
# tool_access_profiles:
#   operator_approved_repository_read:
#     allowed_external_tools:
#       - mcp__github__get_pull_request
#       - mcp__github__list_commits
#   acme_repo_read:
#     profile_kind: operator_approved_repository_read
#     allowed_external_tools:
#       - mcp__acme__list_pull_requests

# Optional: operator-configured model profiles (RFC-003 foundation).
# Each profile binds an explicit runtime/model configuration to durable
# cost_class and resource metadata. The broker never infers these from graph
# role, provider name, runtime type, or model-name folklore.
# model_profiles:
#   dev-mock-low:
#     runtime: mock
#     cost_class: low
#     usage_bucket: dev-sandbox
#     resources:
#       monetary_cost: negligible
#       quota_scarcity: none
#       latency: low
#       local_compute_occupancy: low
#       context_cost: low
#   gateway-standard:
#     runtime: openai_compatible
#     provider: local_gateway
#     cost_class: standard
#     usage_bucket: batch-inference
#     resources:
#       monetary_cost: moderate
#       quota_scarcity: moderate
#       latency: moderate
#       local_compute_occupancy: low
#       context_cost: high

# Optional: bounded rework and escalation policies (RFC-003).
# Select explicitly per task via cost_rework_policy. Omitting a policy preserves
# legacy behavior. Rework intent is never inferred from task text or graph role.
# cost_rework_policies:
#   strict-review:
#     max_premium_tasks: 2
#     max_premium_retries_per_task: 1
#     max_escalations_per_workflow: 1
#     allow_higher_cost_reexecution: false
#     require_escalation_reason: true
